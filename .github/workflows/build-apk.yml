name: Build Kortana APK

# NOTE: this workflow deliberately uses NO `uses:` steps. The account's
# Actions policy blocks external (even GitHub-owned) actions, so everything
# is plain `run:` shell — same pattern as CampLoJack's build-apk.yml.

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'identity/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

permissions:
  contents: write   # publish the APK as a GitHub Release

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out repository (manual — actions/checkout blocked by Actions policy)
        run: |
          git clone --depth 5 "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" .
          git checkout "${GITHUB_SHA}" || git checkout "${GITHUB_REF_NAME}"

      - name: Set up JDK 21 + Android SDK (preinstalled on ubuntu-latest)
        run: |
          echo "JAVA_HOME=${JAVA_HOME_21_X64}" >> "$GITHUB_ENV"
          echo "${JAVA_HOME_21_X64}/bin" >> "$GITHUB_PATH"
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> "$GITHUB_ENV"
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          # compileSdk 36 minor 1 — make sure the exact platform is present
          /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36.1" "platforms;android-36" "build-tools;36.0.0" > /dev/null || true

      - name: Install Gradle 9.2.1 (AGP 9.1.1 needs Gradle 9.x)
        run: |
          wget -q https://services.gradle.org/distributions/gradle-9.2.1-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle
          echo "/tmp/gradle/gradle-9.2.1/bin" >> "$GITHUB_PATH"

      - name: Build debug APK (signed with the committed debug.keystore)
        working-directory: android
        run: |
          gradle --no-daemon assembleDebug
          APK=$(find app/build/outputs/apk/debug -name '*.apk' | head -1)
          if [ -z "$APK" ]; then echo "::error::No APK produced"; exit 1; fi
          cp "$APK" /tmp/kortana-k3-debug.apk
          echo "Built $(du -h /tmp/kortana-k3-debug.apk | cut -f1) APK"

      - name: Publish APK to the kortana-latest release
        run: |
          TAG="kortana-latest"
          # Recreate the rolling release so the download link always serves the newest build
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push --delete origin "$TAG" 2>/dev/null || true
          gh release create "$TAG" /tmp/kortana-k3-debug.apk \
            --title "Kortana K3 — latest APK (build ${GITHUB_RUN_NUMBER})" \
            --notes "Sideloadable debug APK built from ${GITHUB_SHA}.

          Install: download kortana-k3-debug.apk on the phone, allow 'install unknown apps' for your browser/files app, open the file.

          Brain chain: Ollama phi3 (local) -> Claude (backup) -> Gemini (last resort) -> offline rules core.
          Cloud Sync defaults to the Terminus server at http://127.0.0.1:3300/api/sync (see server/README in the repo)."
          echo "APK published: https://github.com/${GITHUB_REPOSITORY}/releases/tag/$TAG"
